name: Publish Scheduled Blog Posts

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:       # Allows manual trigger from GitHub Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Publish due posts
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          echo "Today is $TODAY"
          MOVED=0

          for file in _scheduled/*.html; do
            [ -f "$file" ] || continue
            PUBLISH_DATE=$(grep -o 'publish-date" content="[^"]*"' "$file" | grep -o '[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}')
            if [ -z "$PUBLISH_DATE" ]; then
              echo "No publish-date found in $file — skipping"
              continue
            fi
            echo "Found $file with publish date $PUBLISH_DATE"
            if [[ "$PUBLISH_DATE" <= "$TODAY" ]]; then
              echo "Moving $file to the-tap/"
              mv "$file" "the-tap/$(basename $file)"
              MOVED=1
            fi
          done

          echo "MOVED=$MOVED" >> $GITHUB_ENV

      - name: Rebuild blog index
        if: env.MOVED == '1'
        run: |
          echo "Rebuilding blog index..."
          python3 .github/scripts/rebuild-index.py

      - name: Commit changes
        if: env.MOVED == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Auto-publish scheduled posts for $TODAY"
          git push
