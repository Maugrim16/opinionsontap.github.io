yamlname: Publish Scheduled Posts

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Publish due posts
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          for file in _scheduled/*.html; do
            DATE=$(grep -o 'publish-date" content="[^"]*"' "$file" | grep -o '[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}')
            if [ "$DATE" \<= "$TODAY" ]; then
              mv "$file" the-tap/
              echo "Published: $file"
            fi
          done

      - name: Rebuild blog index
        run: |
          python3 .github/scripts/rebuild-index.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-publish scheduled posts"
          git push
